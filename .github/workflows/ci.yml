name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Types
        run: mypy src/webval
      - name: Unit tests
        run: pytest -m "not integration" --cov=webval --cov-report=term-missing

  integration:
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('pyproject.toml') }}
      - name: Install browsers
        run: playwright install --with-deps chromium
      - name: Integration tests
        run: pytest -m integration
      - name: End-to-end sample run
        run: python scripts/generate_sample_run.py samples/ci
      - name: Upload sample reports
        uses: actions/upload-artifact@v4
        with:
          name: sample-validation-run
          path: samples/ci/
          retention-days: 14
